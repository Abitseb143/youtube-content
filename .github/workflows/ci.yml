name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: faceless
          POSTGRES_PASSWORD: faceless
          POSTGRES_DB: faceless
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U faceless"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://faceless:faceless@localhost:5432/faceless
      REDIS_URL: redis://localhost:6379/0
      S3_BUCKET: ci-bucket
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ak
      S3_SECRET_KEY: sk
      CLERK_JWT_ISSUER: https://test.clerk.accounts.dev
      CLERK_JWT_AUDIENCE: https://app.test
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy_for_build
          CLERK_SECRET_KEY: sk_test_dummy_for_build
        run: pnpm build
